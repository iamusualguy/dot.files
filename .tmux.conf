unbind C-b
unbind C-a
set -g prefix C-a
bind C-a send-prefix

#use mouse
set -g mouse on

# split panes using | and -
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Kill pane without confirmation
bind x kill-pane

#reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# open float window C-a C-g
bind-key g popup -w 83 -h 29 -E "tmux new-session -A -s float" 

# Set the inactive window color and style

set -g window-status-style fg=colour121,bg=default

set -g window-status-format ' #I #W '

# Set the active window color and style

set -g window-status-current-style fg=black,bg=colour121

set -g window-status-current-format '[#I #W]'

set -g pane-border-status top

set -g pane-border-format "#[bold]\uf4d4 #(basename #{pane_current_path})/"


# Pane borders in grayscale
set-option -g pane-border-style fg=colour238
set-option -g pane-active-border-style fg=colour250

# Status bar background and foreground (grayscale)
set-option -g status-bg colour235
set-option -g status-fg colour250

# Window status style (grayscale)
set-window-option -g window-status-style bg=colour235,fg=colour246
set-window-option -g window-status-current-style bg=colour238,fg=colour250

# Message style (grayscale)
set-option -g message-style bg=colour235,fg=colour250

# Mode indicator (e.g., copy mode)
set-option -g mode-style bg=colour238,fg=colour250
